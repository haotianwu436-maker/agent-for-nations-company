version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./apps/api/db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://media_ai:media_ai@postgres:5432/media_ai
    ports:
      - "${API_PORT}:8000"
    depends_on:
      - postgres

  web:
    build:
      context: ./apps/web
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${API_PORT}/api/v1
    ports:
      - "${WEB_PORT}:3000"
    depends_on:
      - api

volumes:
  pg_data:
